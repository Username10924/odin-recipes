<body>
    <h1>Lasagna</h1>
    <img src="../images/lasagna.avif" alt="lasagna" height="200px" width="200px">
    <h2>Description</h2>
    <p>This is an <em>italian meal</em> that is called <strong>lasagna</strong></p>
    <p>it consists of a dough, cheese and minced meat</p>
    <h2>Ingerdients</h2>
    <ul>
        <li>Cheese</li>
        <li>dough</li>
        <li>Your choice of meat</li>
    </ul>
    <h2>Steps</h2>
    <ol>
        <li>Put meat in a plate.</li>
        <li>Place the dough on top.</li>
        <li>Sprinkle cheese, as much as preferred.</li>
    </ol>
